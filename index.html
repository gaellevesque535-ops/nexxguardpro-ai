<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexxGuard Pro AI Dashboard</title>
</head>

<body style="margin:0;background:#f8fbff;font-family:Arial;">
  <div style="min-height:100vh;background:linear-gradient(135deg,#f8fbff,#eaf3ff);color:#0f172a;padding:40px;">
    <h1 style="font-size:48px;color:#0b3b8f;">NexxGuard Pro AI 🚀</h1>
    <p style="font-size:22px;color:#334155;">
      Dashboard IA intelligent — SMART Engine, horaires dynamiques, priorisation IA et assistant temps réel.
    </p>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:40px;">
      <div style="background:white;border-radius:24px;padding:25px;box-shadow:0 10px 30px #dbeafe;">
        <h2 style="color:#0b3b8f;">SMART Score</h2>
        <p style="font-size:34px;color:#d4af37;font-weight:bold;">87%</p>
      </div>

      <div style="background:white;border-radius:24px;padding:25px;box-shadow:0 10px 30px #dbeafe;">
        <h2 style="color:#0b3b8f;">Focus IA</h2>
        <p style="font-size:34px;color:#2563eb;font-weight:bold;">Actif</p>
      </div>

      <div style="background:white;border-radius:24px;padding:25px;box-shadow:0 10px 30px #dbeafe;">
        <h2 style="color:#0b3b8f;">Temps optimisé</h2>
        <p style="font-size:34px;color:#d4af37;font-weight:bold;">+3h</p>
      </div>

      <div style="background:white;border-radius:24px;padding:25px;box-shadow:0 10px 30px #dbeafe;">
        <h2 style="color:#0b3b8f;">Assistant IA</h2>
        <p style="font-size:34px;color:#2563eb;font-weight:bold;">En ligne</p>
      </div>
    </div>
  </div>
</body>
</html>
